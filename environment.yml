name: v1ca1
channels:
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - numpy
  - scipy
  - pandas
  - pyarrow
  - matplotlib
  - scikit-learn
  - seaborn
  - xarray
  - pynwb
  - pytest>=8
  - pip:
      - mountainsort4>=1.0
      - "-e .[analysis,test]"

# Additional packages used by some analyses may need to be installed manually,
# depending on which workflows you run and how your lab environment is managed:
# - jax
# - nemos
# - replay_trajectory_classification
# - position_tools
# - track_linearization
# - ripple_detection
# - non_local_detector
# - trajectory_analysis_tools
# - kyutils  # lab/internal dependency
# - mountainsort4  # installed above via pip for spikesorting workflows
# - sortingview
# - kachery-cloud
#
# If you want figurl or GLM workflow support, install the optional extras:
#   pip install -e ".[analysis,test,figurl]"
#   pip install -e ".[analysis,test,glm]"
